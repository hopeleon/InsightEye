# 风险标记（主要用于内部置信度调整）
# ═══════════════════════════════════════════════════════════════════════

risk_flags:
  n_artifacts:
    cues:
      - "N高分但E分也高（可能是面试焦虑而非真实N特质）"
      - "N高分但只出现在失败/压力话题中（情境激活而非基线）"
      - "其他维度一致但N不稳定（N可能是假信号）"
  impression_management:
    cues:
      - "E分极端高（>85）且I分极端低（<30）"
      - "所有维度都接近中间值（防御性呈现）"
      - "回答风格高度一致但细节缺乏"

