# 输出映射
# ═══════════════════════════════════════════════════════════════════════

output_mapping:
  score_bands:
    "0_24": "弱信号"
    "25_49": "轻度倾向"
    "50_74": "中度倾向"
    "75_100": "强倾向"
  confidence_factors:
    increase:
      - "跨多个问题的一致性信号"
      - "细节丰富且非模板化的自发描述"
      - "正负向线索均存在（表明真实而非刻意呈现）"
      - "N维度在非压力话题中也出现（非情境假象）"
    decrease:
      - "极端分数（>90或<15）"
      - "回答过于模板化"
      - "所有维度信号相互矛盾"
      - "N信号仅在失败话题中出现"
