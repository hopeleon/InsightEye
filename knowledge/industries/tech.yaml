version: "1.0"
industry: "tech"
industry_label: "互联网 / 软件"
industry_desc: "节奏快、数据驱动、强调迭代与跨部门协作"

# ═══════════════════════════════════════════════════
# 行业特有强信号词（在互联网语境下是强正向行为指标）
# ═══════════════════════════════════════════════════
strong_signals:
  growth_mindset:
    label: "增长意识"
    disc_relevance: ["D", "C"]
    star_relevance: ["R", "A"]
    keywords:
      - "拉新"
      - "转化率"
      - "留存"
      - "AB实验"
      - "AB测"
      - "ROI"
      - "获客成本"
      - "北极星指标"
      - "拆解指标"
      - "归因"
      - "数据验证"
      - "对比实验"
      - "拉活"
      - "促活"
      - "复购"
      - "用户增长"
      - "DAU"
      - "MAU"
    interpretation: "体现了以数据驱动方式定义和解决问题的能力"

  ownership:
    label: "Ownership 担当"
    disc_relevance: ["D"]
    star_relevance: ["A", "R"]
    keywords:
      - "我负责"
      - "我主导"
      - "从零到一"
      - "端到端"
      - "全程跟进"
      - "我自己拍板"
      - "是我推动的"
      - "我协调"
      - "我落地"
      - "我发起的"
      - "我拍板的"
      - "我担责"
      - "我兜底"
      - "我来推动"
      - "我拉通的"
    interpretation: "展现了主人翁意识和主动推动能力"

  cross_team_influence:
    label: "跨团队影响力"
    disc_relevance: ["I", "S"]
    star_relevance: ["A"]
    keywords:
      - "和产品对齐"
      - "拉着运营"
      - "拉通各方"
      - "说服了"
      - "没资源也要做"
      - "跨部门"
      - "拉齐"
      - "对齐了"
      - "多方协调"
      - "达成共识"
      - "推动落地"
      - "协调资源"
      - "搞定"
      - "撕资源"
    interpretation: "体现了在资源约束下推动多方协作的能力"

  technical_depth:
    label: "技术深度"
    disc_relevance: ["C"]
    star_relevance: ["S", "A"]
    keywords:
      - "架构设计"
      - "方案选型"
      - "技术债"
      - "性能瓶颈"
      - "可扩展"
      - "稳定性"
      - "容灾"
      - "灰度"
      - "回滚"
      - "压测"
      - "全链路"
      - "熔断"
      - "降级"
      - "限流"
      - "主从"
      - "读写分离"
      - "微服务"
      - "服务化"
      - "领域驱动"
      - "DDD"
      - "重构"
      - "CodeReview"
      - "单元测试"
    interpretation: "体现了扎实的技术功底和系统思维"

  data_decision:
    label: "数据决策"
    disc_relevance: ["C"]
    star_relevance: ["R"]
    keywords:
      - "数据发现"
      - "漏斗分析"
      - "转化漏斗"
      - "提升了"
      - "下降了"
      - "拆解问题"
      - "假设验证"
      - "量化"
      - "量化指标"
      - "数字说话"
      - "数据支撑"
      - "环比"
      - "同比"
      - "基准线"
      - "对照实验"
      - "显著性"
    interpretation: "体现了用数据支撑决策的职业习惯"

  iteration_agility:
    label: "迭代敏捷性"
    disc_relevance: ["D", "I"]
    star_relevance: ["A"]
    keywords:
      - "快速迭代"
      - "小步快跑"
      - "先跑起来"
      - "MVP"
      - "最小可行"
      - "灰度发布"
      - "A/B测"
      - "验证"
      - "试错"
      - "快速试错"
      - "调整策略"
      - "优化"
      - "迭代版本"
    interpretation: "体现了在不确定性中快速学习和调整的能力"

# ═══════════════════════════════════════════════════
# 行业特有弱信号词（说明行为深度不够）
# ═══════════════════════════════════════════════════
weak_signals:
  vague_result:
    label: "结果泛化"
    keywords:
      - "效果不错"
      - "有了提升"
      - "改善了很多"
      - "做得还可以"
      - "反响很好"
      - "还可以"
      - "不错"
      - "挺好的"
      - "比较成功"
    expected: "需要出现具体数字（%或倍数）、时间节点、对比基准"
    severity: "high"

  team_vague:
    label: "团队贡献模糊"
    keywords:
      - "我们团队"
      - "大家一起"
      - "协作完成"
      - "共同推进"
      - "分工配合"
    expected: "需要说明个人在团队中的具体角色和独特贡献"
    severity: "medium"

  process_without_why:
    label: "有流程无推理"
    keywords:
      - "做了优化"
      - "调整了"
      - "换了方案"
      - "采用了"
      - "上线了"
    expected: "需要说明为什么选择这个方案而非其他"
    severity: "medium"

  buzzword_without_detail:
    label: "黑话填充"
    keywords:
      - "赋能"
      - "闭环"
      - "抓手"
      - "颗粒度"
      - "方法论"
      - "全链路"
    expected: "黑话出现时必须有对应的具体行为支撑"
    severity: "medium"

# ═══════════════════════════════════════════════════
# 互联网行业岗位行为基准（打分参照系）
# 当特征值 >= benchmark 时，该维度视为"符合该岗位标准"
# ═══════════════════════════════════════════════════
job_benchmarks:
  product_manager:
    description: "产品经理"
    star_structure_min: 0.60
    cross_team_min: 0.50
    data_evidence_min: 0.60
    ownership_density_min: 0.35
    expected_disc_style: "D/I 或 D/C 主导"
    typical_strong_dims: ["D", "I", "C"]
    typical_weak_dims: ["S"]
    red_flags:
      - "全程无数字"
      - "全是'我们'无'我'"
      - "无跨团队协作证据"
      - "STAR-T 极低（角色定位模糊）"
    competency_notes:
      - "增长意识 > 技术深度"
      - "跨团队推动 > 单兵作战"
      - "数据决策 > 直觉判断"

  backend_engineer:
    description: "后端工程师"
    star_structure_min: 0.55
    technical_depth_min: 0.50
    data_evidence_min: 0.55
    ownership_density_min: 0.50
    expected_disc_style: "C 为主，可搭配 D"
    typical_strong_dims: ["C"]
    typical_weak_dims: ["I"]
    red_flags:
      - "技术描述停在工具名，无架构设计"
      - "无稳定性/性能相关讨论"
      - "结果无量化"
      - "STAR-R 极低"
    competency_notes:
      - "技术深度 > 跨团队能力"
      - "数据意识 > 增长思维"
      - "Owner意识 > 参与感"

  frontend_engineer:
    description: "前端工程师"
    star_structure_min: 0.55
    technical_depth_min: 0.45
    data_evidence_min: 0.50
    ownership_density_min: 0.45
    expected_disc_style: "C 为主，可搭配 I"
    typical_strong_dims: ["C", "I"]
    typical_weak_dims: ["D"]
    red_flags:
      - "技术栈停在框架名，无原理讨论"
      - "无性能/兼容性相关讨论"
      - "无测试/质量意识"
    competency_notes:
      - "工程意识 > 特效炫技"
      - "协作沟通 > 单干"

  data_engineer:
    description: "数据工程师 / 分析师"
    star_structure_min: 0.50
    technical_depth_min: 0.55
    data_evidence_min: 0.75
    ownership_density_min: 0.40
    expected_disc_style: "C 为主，可搭配 I"
    typical_strong_dims: ["C"]
    typical_weak_dims: ["D"]
    red_flags:
      - "全程无 SQL / 数据管道 / 模型讨论"
      - "无数据质量/准确性验证"
      - "结论无数据支撑"
    competency_notes:
      - "数据准确性 > 故事性"
      - "技术深度 > 业务表达"

  operations:
    description: "运营"
    star_structure_min: 0.50
    cross_team_min: 0.50
    data_evidence_min: 0.70
    ownership_density_min: 0.30
    expected_disc_style: "I/S 或 D/S"
    typical_strong_dims: ["I", "S"]
    typical_weak_dims: []
    red_flags:
      - "全程无数据"
      - "无任何 A/R 维度证据"
      - "渠道/用户描述模糊"
    competency_notes:
      - "数据意识是核心能力"
      - "增长思维 > 执行力"
      - "跨部门 > 单功能"

  sales:
    description: "销售 / BD"
    star_structure_min: 0.45
    cross_team_min: 0.55
    data_evidence_min: 0.60
    ownership_density_min: 0.40
    expected_disc_style: "D/I 主导"
    typical_strong_dims: ["D", "I"]
    typical_weak_dims: ["S", "C"]
    red_flags:
      - "无任何成交/拿单/谈判经历"
      - "无客户关系维护讨论"
      - "全是团队成果无个人贡献"
    competency_notes:
      - "拿单能力 > 过程描述"
      - "客户洞察 > 产品知识"
      - "谈判影响力 > 执行配合"

  product_owner:
    description: "项目经理 / 项目负责人"
    star_structure_min: 0.60
    cross_team_min: 0.60
    data_evidence_min: 0.55
    ownership_density_min: 0.50
    expected_disc_style: "D/S 主导，可搭配 I"
    typical_strong_dims: ["D", "S"]
    typical_weak_dims: ["C"]
    red_flags:
      - "无风险管理/排期/资源协调"
      - "无交付里程碑描述"
      - "全是执行无推动"
    competency_notes:
      - "推动力 > 技术深度"
      - "多方协调 > 单点突破"

# ═══════════════════════════════════════════════════
# 分析优先级（给定岗位后，优先验证哪些维度）
# ═══════════════════════════════════════════════════
analysis_priorities:
  backend_engineer:
    order: ["star_structure", "technical_depth", "data_evidence", "ownership"]
  frontend_engineer:
    order: ["star_structure", "technical_depth", "cross_team", "data_evidence"]
  data_engineer:
    order: ["data_evidence", "star_structure", "technical_depth", "ownership"]
  product_manager:
    order: ["growth_mindset", "cross_team", "data_evidence", "star_structure"]
  operations:
    order: ["data_evidence", "growth_mindset", "cross_team", "star_structure"]
  sales:
    order: ["ownership", "cross_team", "data_evidence", "star_structure"]
  product_owner:
    order: ["cross_team", "star_structure", "ownership", "data_evidence"]
  default:
    order: ["star_structure", "data_evidence", "cross_team", "ownership"]
