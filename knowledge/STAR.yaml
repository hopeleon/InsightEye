version: "1.0"
model: "STAR"
scenario: "behavioral_interview"
purpose: "local rule engine for STAR structure scoring, defect detection, authenticity assessment, and behavioral probe generation"

disclaimer:
  - "STAR quality scores are linguistic indicators, not proof of actual experience."
  - "Repeatable structured narratives with consistent detail are stronger authenticity signals."
  - "Self-presentation bias in interviews may inflate action and result scores."
  - "Contextual cues (exact dates, team size, budget numbers) are the most verifiable signals."

# ═══════════════════════════════════════════════════
# 全局规则
# ═══════════════════════════════════════════════════

global_rules:
  # 单条回答字数基准（供本地规则参考）
  min_answer_length: 20
  preferred_answer_length: 80

  # 真实性综合加权（A/R 各 35%，S/T 各 15%，与 star_analyzer.py 的 STARScore 权重一致）
  weight_overall: { S: 0.15, T: 0.15, A: 0.35, R: 0.35 }

  # 置信度等级判定规则
  # 由 star_analyzer.py 在生成 authenticity_summary 时读取
  confidence_rules:
    low:
      - "样本总字数低于 60 字，或单条回答低于 20 字"
      - "所有回答结构高度相似，缺乏变异性"
      - "出现明显模板套用痕迹"
      - "出现自我矛盾的归因叙述"
    medium:
      - "有 2-3 条结构较完整的 STAR 回答"
      - "缺陷与强信号并存，样本量尚不足以定论"
      - "存在明显的部分维度缺失（如 R 高但 A 低）"
    high:
      - "3 条以上回答各有特色，且细节丰富"
      - "量化指标、时间标记、角色边界在各条中一致"
      - "真实性风险评估为 low，且无高严重度缺陷"

  # 防过度声明规则（供人工解读参考，不影响评分）
  anti_overclaim:
    - "避免将单一回答的结构完整等同于候选人整体能力"
    - "A/R 维度高分时需验证是否存在行动与结果的内部一致性"
    - "当多个缺陷并存时，优先采信缺陷覆盖更多的维度得分"
    - "警惕「完美叙事」：高 S+T+A+R 同时出现可能是经过精心准备的模板"

  # 缺陷高阶组合交互规则
  # 由 star_analyzer.py 在生成 authenticity_summary 时读取并输出结论
  defect_interactions:
    - trigger:
        defects: ["situation_missing", "action_vague"]
      conclusion: "可能是记忆模糊或经历不深，而非刻意掩饰，建议追问真实细节。"
    - trigger:
        defects: ["fake_star", "result_attribution_error"]
      conclusion: "高风险信号，可能是经历美化或夸大，建议后续面试重点验证。"
    - trigger:
        defects: ["team_substitution", "result_abstract"]
      conclusion: "集体叙事加结果泛化并存的经典套路特征，需多次追问确认。"
    - trigger:
        defects: ["fake_star", "situation_missing", "result_abstract"]
      conclusion: "可能对经历的掌握程度较浅，建议试探另一个完整 STAR。"

# ═══════════════════════════════════════════════════
# 输入特征（与 app/features.py extract_features() 保持严格对齐）
# 标注 [已实现] 的特征可直接被 star_analyzer.py 使用；
# 标注 [待实现] 的特征目前 star_analyzer.py 用正则独立计算
# ═══════════════════════════════════════════════════

