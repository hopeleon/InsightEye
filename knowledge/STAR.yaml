    - action_verbs_ratio             # [已实现] features.py 第 95 行
    - achievement_words_ratio         # [已实现] features.py 第 101 行
    - buzzword_density               # [已实现] features.py 第 122 行
    - detail_words_ratio              # [已实现] features.py 第 103 行
    - risk_words_ratio               # [已实现] features.py 第 104 行
    - certainty_words_ratio           # [已实现] features.py 第 99 行
    - hedge_words_ratio              # [已实现] features.py 第 100 行
