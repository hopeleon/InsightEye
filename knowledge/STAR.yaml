    - story_richness_score            # [已实现] features.py 第 121 行
    - context_marker_density          # [待实现] 情境标记词密度，star_analyzer 暂用正则
    - result_attribution_self_ratio   # [待实现] 自我归因词密度，star_analyzer 暂用正则
